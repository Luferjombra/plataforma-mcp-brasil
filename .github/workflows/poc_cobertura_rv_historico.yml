name: POC — Cobertura rv_historico

# Workflow temporário, só workflow_dispatch -- confirma os números reais
# de cobertura de rv_historico por ticker após corrigir um bug de
# paginação (select de rv_ativos sem .range() truncava em 1000 linhas
# via limite padrão do PostgREST). Ver etl/poc_cobertura_rv_historico.py.
# Remover depois de confirmado.

on:
  workflow_dispatch:

jobs:
  cobertura:
    name: Cobertura rv_historico (corrigido)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar consulta de cobertura rv_historico
        working-directory: etl
        run: python poc_cobertura_rv_historico.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PYTHONUNBUFFERED: '1'
