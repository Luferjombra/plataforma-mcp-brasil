name: ETL Pipeline

on:
  schedule:
    # Tesouro Direto: 10h BRT (13h UTC) — dados do dia anterior disponíveis
    - cron: '0 13 * * 1-5'
    # Renda Variável (B3): 17h30 BRT (20h30 UTC) — após fechamento pregão
    - cron: '30 20 * * 1-5'
    # Fundos CVM: 18h BRT (21h UTC) — CVM publica D-1 à tarde
    - cron: '0 21 * * 1-5'
    # Indicadores macro (BACEN/IBGE): dias úteis 9h BRT (12h UTC).
    # SELIC e CDI são diários — semanal deixava dashboard defasado.
    # IPCA (mensal) e PIB (trimestral) só atualizam quando há nova publicação,
    # mas o ETL é idempotente (upsert), então rodar diário é seguro.
    - cron: '0 12 * * 1-5'
    # Notícias RSS: 2x por dia todos os dias (feeds atualizam 24/7)
    - cron: '0 11 * * *'
    - cron: '0 22 * * *'
    # ANBIMA: índices IMA/IDA + debêntures às 14h BRT (17h UTC) — dados D-1 disponíveis
    - cron: '0 17 * * 1-5'
    # COTAHIST staging (Fase 1 — ver ADR-001): rodadas espalhadas ao longo da
    # noite + 1 checagem na manhã seguinte, só nesta semana, para descobrir
    # empiricamente a que horas a B3 publica o arquivo diário. Minutos em
    # :10/:40 (em vez de :00/:30) só para não colidir com os crons acima nos
    # logs. Horários em BRT (UTC-3), com rollover de dia onde necessário:
    - cron: '10 21 * * 1-5'   # 18h10 BRT
    - cron: '10 22 * * 1-5'   # 19h10 BRT
    - cron: '10 23 * * 1-5'   # 20h10 BRT
    - cron: '10 0 * * 2-6'    # 21h10 BRT (rollover: UTC já é o dia seguinte)
    - cron: '40 1 * * 2-6'    # 22h40 BRT (rollover)
    - cron: '10 10 * * 2-6'   # 07h10 BRT do dia seguinte — fallback/manhã
  workflow_dispatch:
    inputs:
      etl:
        description: 'ETL para rodar manualmente'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - rf_tesouro
          - rv_historico
          - fundos
          - indicadores
          - noticias
          - anbima
          - anbima_cri
          - anbima_cra
          - cotahist_staging
          - cotahist_backfill
          - validar_cotahist
          - validar_cotahist_ajustado
          - eventos_corporativos
          - ajuste_proventos

jobs:
  # ── Tesouro Direto (RF) ───────────────────────────────────────────────────
  etl-rf:
    name: ETL Renda Fixa (Tesouro Direto)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'rf_tesouro' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 13 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL Renda Fixa
        working-directory: etl
        run: python rf_tesouro.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ── Renda Variável (B3) ───────────────────────────────────────────────────
  etl-rv:
    name: ETL Renda Variável (B3)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'rv_historico' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '30 20 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL Renda Variável
        working-directory: etl
        run: python rv_historico.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}

  # ── Fundos de Investimento (CVM) ──────────────────────────────────────────
  etl-fundos:
    name: ETL Fundos de Investimento (CVM)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'fundos' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 21 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL Fundos
        working-directory: etl
        run: python fundos.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ── Indicadores Macro ─────────────────────────────────────────────────────
  etl-indicadores:
    name: ETL Indicadores Macro (BACEN/IBGE)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'indicadores' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL Indicadores
        working-directory: etl
        run: python indicadores.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ── COTAHIST Staging (B3) — Fase 1, ver ADR-001 ──────────────────────────
  # Roda várias vezes ao dia só nesta semana para descobrir empiricamente a
  # janela de publicação do arquivo diário da B3. Escreve só em tabelas de
  # staging (rv_ativos_staging / rv_historico_staging) — nunca em produção.
  etl-cotahist-staging:
    name: ETL COTAHIST Staging (B3) — descoberta de horário
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'cotahist_staging' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && (
        github.event.schedule == '10 21 * * 1-5' ||
        github.event.schedule == '10 22 * * 1-5' ||
        github.event.schedule == '10 23 * * 1-5' ||
        github.event.schedule == '10 0 * * 2-6'  ||
        github.event.schedule == '40 1 * * 2-6'  ||
        github.event.schedule == '10 10 * * 2-6'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL COTAHIST (staging)
        working-directory: etl
        run: python cotahist.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ── COTAHIST Backfill histórico (staging) — só manual ────────────────────
  # Baixa arquivos ANUAIS do COTAHIST para reconstituir histórico retroativo.
  # Não tem schedule — roda sob demanda via workflow_dispatch. Padrão: 1 ano.
  etl-cotahist-backfill:
    name: ETL COTAHIST Backfill (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.etl == 'cotahist_backfill'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL COTAHIST Backfill
        working-directory: etl
        run: python cotahist_backfill.py --anos 1
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ── Validação cruzada COTAHIST vs brapi — só manual ───────────────────────
  # Compara staging (COTAHIST) com produção (brapi) nos tickers já cobertos.
  # Só leitura — não escreve em nenhuma tabela. Fase 2, ver ADR-001.
  etl-validar-cotahist:
    name: Validação cruzada COTAHIST vs brapi
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.etl == 'validar_cotahist'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar validação cruzada
        working-directory: etl
        run: python validar_cotahist.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ── Validação cruzada (fechamento_adj) — só manual ────────────────────────
  # Mesma comparação, mas fechamento (brapi) x fechamento_adj (staging) — usar
  # depois de rodar aplicar_ajuste_proventos.py. Ver ADR-001.
  etl-validar-cotahist-ajustado:
    name: Validação cruzada COTAHIST vs brapi (ajustado)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.etl == 'validar_cotahist_ajustado'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar validação cruzada (ajustado)
        working-directory: etl
        run: python validar_cotahist.py --usar-ajustado
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ── Eventos Corporativos (brapi dividendsData) — só manual por enquanto ───
  # Popula rv_eventos_societarios + rv_proventos. Ver ADR-001. Manual até
  # validar volume real de dados; depois vira cron (mesma cadência de RV).
  etl-eventos-corporativos:
    name: ETL Eventos Corporativos (bonificação/desdobramento/proventos)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.etl == 'eventos_corporativos'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL Eventos Corporativos
        working-directory: etl
        run: python eventos_corporativos.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}

  # ── Ajuste por proventos (fechamento_adj em rv_historico_staging) — manual ─
  # Aplica preco_ajustado = preco_bruto / fator nos tickers com evento
  # societário cadastrado (rv_eventos_societarios). Fase 2, ver ADR-001.
  # Requer migration 011 executada antes (adiciona a coluna fechamento_adj).
  etl-ajuste-proventos:
    name: ETL Ajuste por Proventos (fechamento_adj staging)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.etl == 'ajuste_proventos'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL Ajuste por Proventos
        working-directory: etl
        run: python aplicar_ajuste_proventos.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ── Notícias RSS ──────────────────────────────────────────────────────────
  etl-noticias:
    name: ETL Notícias RSS
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'noticias' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && (github.event.schedule == '0 11 * * *' || github.event.schedule == '0 22 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL Notícias
        working-directory: etl
        run: python noticias.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ── ANBIMA (Índices IMA/IDA + Debêntures + VNA) ───────────────────────────
  etl-anbima:
    name: ETL ANBIMA (Índices + Debêntures + VNA)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'anbima' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 17 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL ANBIMA
        working-directory: etl
        run: python anbima.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANBIMA_CLIENT_ID: ${{ secrets.ANBIMA_CLIENT_ID }}
          ANBIMA_CLIENT_SECRET: ${{ secrets.ANBIMA_CLIENT_SECRET }}

  # ── ANBIMA CRI (Certificados de Recebíveis Imobiliários) ──────────────────
  # Só no dispatch dedicado 'anbima_cri'. No schedule e no 'all', o job
  # etl-anbima (feed 'all') já coleta CRI/CRA — antes rodava em dobro.
  etl-anbima-cri:
    name: ETL ANBIMA CRI
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.etl == 'anbima_cri'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL CRI
        working-directory: etl
        run: python anbima.py --feed cri
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANBIMA_CLIENT_ID: ${{ secrets.ANBIMA_CLIENT_ID }}
          ANBIMA_CLIENT_SECRET: ${{ secrets.ANBIMA_CLIENT_SECRET }}

  # ── ANBIMA CRA (Certificados de Recebíveis do Agronegócio) ────────────────
  # Só no dispatch dedicado 'anbima_cra' (ver comentário em etl-anbima-cri).
  etl-anbima-cra:
    name: ETL ANBIMA CRA
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.etl == 'anbima_cra'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL CRA
        working-directory: etl
        run: python anbima.py --feed cra
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANBIMA_CLIENT_ID: ${{ secrets.ANBIMA_CLIENT_ID }}
          ANBIMA_CLIENT_SECRET: ${{ secrets.ANBIMA_CLIENT_SECRET }}
