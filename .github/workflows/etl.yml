name: ETL Pipeline

on:
  schedule:
    # Tesouro Direto: 10h BRT (13h UTC) — dados do dia anterior disponíveis
    - cron: '0 13 * * 1-5'
    # Fundos CVM: 18h BRT (21h UTC) — CVM publica D-1 à tarde
    - cron: '0 21 * * 1-5'
    # Métricas analíticas de fundos: 19h BRT (22h UTC), 1h depois de 'fundos'
    # (folga pra terminar o download+processamento do CVM antes de calcular
    # em cima do fundos_historico do dia — ver comentário no job na matrix).
    - cron: '0 22 * * 1-5'
    # Indicadores macro (BACEN/IBGE): dias úteis 9h BRT (12h UTC).
    # SELIC e CDI são diários — semanal deixava dashboard defasado.
    # IPCA (mensal) e PIB (trimestral) só atualizam quando há nova publicação,
    # mas o ETL é idempotente (upsert), então rodar diário é seguro.
    - cron: '0 12 * * 1-5'
    # Notícias RSS: 2x por dia todos os dias (feeds atualizam 24/7)
    - cron: '0 11 * * *'
    - cron: '0 22 * * *'
    # ANBIMA: índices IMA/IDA + debêntures às 14h BRT (17h UTC) — dados D-1 disponíveis
    - cron: '0 17 * * 1-5'
    # Eventos Corporativos (brapi dividends): 16h BRT (19h UTC), 1x/dia.
    # A brapi tem cota diária baixa para dividends=true (~13 tickers antes de
    # 403 — ver ADR-001). O script é resumível (pula tickers já cobertos,
    # para no primeiro 403), então rodar 1x/dia converge sozinho até cobrir
    # os 31 tickers, sem precisar de disparo manual repetido.
    - cron: '0 19 * * 1-5'
    # COTAHIST staging (produção — ver ADR-001, Passo 6): simplificado de 6
    # janelas de descoberta (Fase 1) para 1 cron principal + 1 fallback de
    # manhã. A Fase 1 mostrou que não há horário fixo de publicação da B3
    # (variou de ~19h a depois das 21h10 BRT na mesma semana) — por isso o
    # fallback D-1 dentro do próprio script (não só o cron) continua
    # obrigatório. Horários em BRT (UTC-3), com rollover de dia:
    - cron: '10 0 * * 2-6'    # 21h10 BRT (rollover: UTC já é o dia seguinte)
    - cron: '10 10 * * 2-6'   # 07h10 BRT do dia seguinte — fallback/manhã
    # Promoção COTAHIST -> produção: ADR-001, Passo 6 concluído (2026-07-20)
    # -- a operação paralela (validação cruzada, 0 divergências) já validou
    # o COTAHIST como fonte confiável; rv_historico.py (brapi) aposentado
    # como driver diário de preço (mantido só como fallback manual, ver
    # workflow_dispatch). Reaproveita o horário que era da validação cruzada
    # diária (agora manual-only, ver job validar_cotahist) -- roda depois
    # dos dois crons de staging (21h10/07h10 BRT), dando tempo do arquivo
    # do dia (ou o fallback D-1) já estar processado em staging.
    - cron: '15 11 * * 2-6'   # 08h15 BRT do dia seguinte
    # Crosswalk CVM (B3) + Fundamentos CVM (DFP): dia 1 do mês, 12h/13h BRT
    # (15h/16h UTC) — cadastro de empresas e DFP são quase estáticos,
    # cadência mensal basta. 1h de offset entre os dois (fundamentos
    # depende de cd_cvm já populado pelo crosswalk).
    - cron: '0 15 1 * *'
    - cron: '0 16 1 * *'
  workflow_dispatch:
    inputs:
      etl:
        description: 'ETL para rodar manualmente'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - rf_tesouro
          - rv_historico
          - fundos
          - fund_analytics
          - indicadores
          - noticias
          - anbima
          - anbima_cri
          - anbima_cra
          - cotahist_staging
          - cotahist_backfill
          - validar_cotahist
          - validar_cotahist_ajustado
          - eventos_corporativos
          - ajuste_proventos
          - promover_cotahist_dry_run
          - promover_cotahist
          - sortear_fundos
          - crosswalk_cvm
          - crosswalk_cvm_dry_run
          - fundamentos_cvm
          - fundamentos_cvm_dry_run

jobs:
  # R7 (backlog): os ~16 jobs eram quase idênticos (checkout, setup-python,
  # install, 1 run, mesmos secrets) diferindo só em qual script/args rodar e
  # quando disparar. Consolidados num único job com strategy.matrix.include
  # -- cada item abaixo define o que antes era 1 job inteiro. `crons: []` +
  # `in_all: false` = só roda via workflow_dispatch com o `id` exato (nunca
  # em `all` nem em schedule); isso preserva a mesma classe de jobs
  # "manuais" que existia antes (backfill, promoção, validação ajustada,
  # ajuste de proventos, ANBIMA CRI/CRA dedicados).
  etl:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    # Default 360 (o mesmo default do GitHub Actions) -- preserva o comportamento
    # original, onde só cotahist_backfill tinha timeout-minutes explícito (30).
    # Achado de revisão: um fallback de 15min aqui cortaria silenciosamente 15
    # jobs que nunca tiveram timeout (incl. promover_cotahist, que escreve em
    # produção, e rv_historico, que pode acumular retries da brapi).
    timeout-minutes: ${{ matrix.timeout || 360 }}
    # A condição de disparo por item da matrix foi movida pra cada step (ver
    # `if: *deve_rodar` abaixo) -- achado real, descoberto tentando disparar
    # de verdade via workflow_dispatch: o contexto `matrix` não existe ainda
    # no `if:` de NÍVEL DE JOB (é resolvido só depois, quando a matrix já foi
    # expandida em instâncias concretas) -- "Unrecognized named-value: matrix"
    # do próprio parser do GitHub. Um `if:` de job aqui quebra o parse do
    # workflow inteiro (nenhum job roda, nem os agendados). A âncora YAML
    # evita repetir a mesma expressão 4 vezes num por step.
    env:
      DEVE_RODAR: &deve_rodar |
        github.event_name == 'workflow_dispatch' && (
          github.event.inputs.etl == matrix.id ||
          (github.event.inputs.etl == 'all' && matrix.in_all)
        ) ||
        github.event_name == 'schedule' && contains(matrix.crons, github.event.schedule)
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Tesouro Direto (RF) ──────────────────────────────────────
          - id: rf_tesouro
            label: 'ETL Renda Fixa (Tesouro Direto)'
            script: rf_tesouro.py
            args: ''
            crons: ['0 13 * * 1-5']
            in_all: true

          # ── Renda Variável (B3) — aposentado como driver diário de preço
          # em 2026-07-20 (ADR-001, Passo 6 concluído): COTAHIST/promover_cotahist
          # assumiu esse papel pro universo completo. Mantido só como
          # fallback manual (workflow_dispatch), não entra mais em 'all'
          # nem tem cron -- mesma classe dos outros jobs manuais deste arquivo.
          - id: rv_historico
            label: 'ETL Renda Variável (B3)'
            script: rv_historico.py
            args: ''
            crons: []
            in_all: false

          # ── Fundos de Investimento (CVM) ─────────────────────────────
          # timeout de job explícito (achado real via workflow_dispatch): a
          # CVM ficou >12min sem responder nem falhar num dispatch de teste
          # do download automático (cad_fi.csv/inf_diario_fi via
          # garantir_cadastro_local/garantir_historico_local) -- o mesmo
          # comportamento de "transferência lenta nunca estoura timeout por
          # request" já visto em investigar_cvm_175. Sem teto, ficaria preso
          # até o default de 360min.
          # 30min, não 20 -- achado de revisão: o pior caso já configurado
          # DENTRO do script (retries de baixar_arquivo_http, sem backoff)
          # soma sozinho ~21min só em downloads (cad_fi.csv: 3x180s=9min;
          # inf_diario_fi x2 meses: 2x180s cada=12min), antes de
          # checkout/pip install/parsing/upsert. Um teto de 20min mataria
          # até uma execução normal (rede lenta mas progredindo), não só um
          # hang de verdade -- 30min dá folga real sobre esse teto interno.
          - id: fundos
            label: 'ETL Fundos de Investimento (CVM)'
            script: fundos.py
            args: ''
            crons: ['0 21 * * 1-5']
            in_all: true
            timeout: 30

          # ── Métricas analíticas de fundos (Sharpe/vol/drawdown/%CDI) --
          # roda 1h depois de 'fundos' (19h BRT) pra calcular em cima do
          # fundos_historico do dia. Não entra em 'all': é uma camada
          # derivada, mesmo padrão de eventos_corporativos/ajuste_proventos.
          # Folga de 1h (não 15min) por decisão explícita, achado de revisão:
          # os dois são jobs de matrix independentes, sem `needs:` entre
          # eles, e 'fundos' agora baixa cad_fi.csv (dezenas de MB) + 2
          # meses de inf_diario_fi do zero a cada run, sem cache -- pode não
          # terminar em 15min. Se 'fundos' atrasar além de 1h, este job só
          # calcula sobre fundos_historico de ontem (1 dia desatualizado,
          # inofensivo) -- risco aceito, não um bug a esconder.
          - id: fund_analytics
            label: 'ETL Métricas Analíticas de Fundos'
            script: fund_analytics.py
            args: ''
            crons: ['0 22 * * 1-5']
            in_all: false

          # ── Indicadores Macro ─────────────────────────────────────────
          - id: indicadores
            label: 'ETL Indicadores Macro (BACEN/IBGE)'
            script: indicadores.py
            args: ''
            crons: ['0 12 * * 1-5']
            in_all: true

          # ── COTAHIST Staging (B3) — ver ADR-001, Passo 6 (operação
          # paralela). 1 cron principal à noite + 1 fallback de manhã
          # (simplificado da Fase 1, que rodava 6x/dia pra descobrir a
          # janela de publicação da B3). Continua escrevendo só em staging
          # (rv_ativos_staging / rv_historico_staging) — nunca em produção;
          # a promoção é feita por etl/promover_cotahist.py.
          - id: cotahist_staging
            label: 'ETL COTAHIST Staging (B3)'
            script: cotahist.py
            args: ''
            crons: ['10 0 * * 2-6', '10 10 * * 2-6']
            in_all: true

          # ── COTAHIST Backfill histórico (staging) — só manual. Baixa
          # arquivos ANUAIS do COTAHIST pra reconstituir histórico
          # retroativo. Sem schedule — roda sob demanda. Padrão: 1 ano.
          - id: cotahist_backfill
            label: 'ETL COTAHIST Backfill (staging)'
            script: cotahist_backfill.py
            args: '--anos 1'
            crons: []
            in_all: false
            timeout: 30

          # ── Validação cruzada COTAHIST vs brapi — só manual desde
          # 2026-07-20. Era diária durante a operação paralela (ADR-001,
          # Passo 6), mas com rv_historico.py aposentado como driver de
          # produção, "produção" deixa de ser uma fonte brapi independente
          # -- a comparação perde a função de cross-check contínuo (viraria
          # staging fresco vs. produção que É o próprio COTAHIST, só
          # levemente atrasado). Mantido como ferramenta de conferência
          # pontual (workflow_dispatch), não como guarda automática.
          - id: validar_cotahist
            label: 'Validação cruzada COTAHIST vs brapi'
            script: validar_cotahist.py
            args: ''
            crons: []
            in_all: false

          # ── Validação cruzada (fechamento_adj) — só manual. Mesma
          # comparação, mas fechamento (brapi) x fechamento_adj (staging)
          # — usar depois de rodar aplicar_ajuste_proventos.py.
          - id: validar_cotahist_ajustado
            label: 'Validação cruzada COTAHIST vs brapi (ajustado)'
            script: validar_cotahist.py
            args: '--usar-ajustado'
            crons: []
            in_all: false

          # ── Promoção COTAHIST -> produção (ADR-001, Fase 2, Passo 5) —
          # dry-run. Só leitura, não precisa da migration 012.
          - id: promover_cotahist_dry_run
            label: 'Promoção COTAHIST -> produção (dry-run)'
            script: promover_cotahist.py
            args: '--dry-run'
            crons: []
            in_all: false

          # ── Promoção COTAHIST -> produção (ADR-001, Fase 2, Passo 5) —
          # real. ESCREVE em rv_ativos/rv_historico (produção). Requer
          # migration 012_widen_ticker_producao.sql executada antes (já
          # aplicada). Recorrente desde 2026-07-20 -- até então só rodava
          # via workflow_dispatch (o corte inicial de 08/07 foi único, sem
          # promoção diária depois, deixando os ~2.337 tickers exclusivos
          # do COTAHIST sem atualização de preço por 12 dias -- achado
          # real, corrigido junto com esta mudança). Continua disparável
          # manualmente também.
          - id: promover_cotahist
            label: 'Promoção COTAHIST -> produção'
            script: promover_cotahist.py
            args: ''
            crons: ['15 11 * * 2-6']
            in_all: false

          # ── Eventos Corporativos (brapi dividendsData) — cron diário +
          # manual. Popula rv_eventos_societarios + rv_proventos. Volume
          # real já validado (cota diária da brapi ~13 tickers) — script
          # resumível converge sozinho no cron. NÃO entra em 'all' (mesmo
          # comportamento de sempre).
          - id: eventos_corporativos
            label: 'ETL Eventos Corporativos (bonificação/desdobramento/proventos)'
            script: eventos_corporativos.py
            args: ''
            crons: ['0 19 * * 1-5']
            in_all: false

          # ── Ajuste por proventos (fechamento_adj em
          # rv_historico_staging) — manual. Aplica preco_ajustado =
          # preco_bruto / fator nos tickers com evento societário
          # cadastrado. Requer migration 011 executada antes.
          - id: ajuste_proventos
            label: 'ETL Ajuste por Proventos (fechamento_adj staging)'
            script: aplicar_ajuste_proventos.py
            args: ''
            crons: []
            in_all: false

          # ── Sorteio de novos fundos (CVM) — só manual, só leitura. Não
          # grava nada; imprime candidatos sorteados (Cambial + reforço de
          # Ações/Multimercado/Renda Fixa/Crédito Privado) para revisão
          # humana antes de entrarem em CNPJS_ALVO. Descartável depois de
          # decidir a expansão da Fase 1 do backlog de fundos.
          - id: sortear_fundos
            label: 'Sorteio de Novos Fundos (CVM)'
            script: sortear_fundos.py
            args: ''
            crons: []
            in_all: false
            # mesmo risco de hang de 'fundos' (chama as mesmas funções
            # garantir_cadastro_local/garantir_historico_local) -- mesmo teto
            # (ver comentário em 'fundos' sobre por que 30min, não 20).
            timeout: 30

          # ── Crosswalk CVM (B3 GetInitialCompanies) — popula
          # rv_ativos.cd_cvm. Fonte quase estática (cadastro de empresas
          # listadas) — cadência mensal é suficiente; upsert idempotente
          # torna reprocessar seguro. Precede fundamentos_cvm via offset
          # de cron (não `needs:` — matrix jobs são independentes, mesmo
          # padrão de fund_analytics/fundos). NÃO entra em 'all' — jobs
          # derivados/secundários, mesmo padrão de eventos_corporativos.
          - id: crosswalk_cvm
            label: 'ETL Crosswalk CVM (B3 -> cd_cvm)'
            script: crosswalk_cvm.py
            args: ''
            crons: ['0 15 1 * *']   # dia 1 do mês, 12h BRT
            in_all: false

          # ── Crosswalk CVM — dry-run. Só leitura, imprime quantos
          # tickers seriam resolvidos sem escrever em rv_ativos. Rodar
          # antes do cron mensal ficar ativo sem supervisão.
          - id: crosswalk_cvm_dry_run
            label: 'Crosswalk CVM (dry-run)'
            script: crosswalk_cvm.py
            args: '--dry-run'
            crons: []
            in_all: false

          # ── Fundamentos CVM (DFP: Lucro Líquido/PL/ROE) — depende de
          # rv_ativos.cd_cvm já populado (offset de 1h sobre crosswalk_cvm).
          # DFP é anual, mas retificações (VERSAO) ocorrem ao longo do ano
          # — cadência mensal reprocessa o ano vigente e converge via
          # upsert idempotente. timeout explícito: mesma classe de risco
          # do job 'fundos' (download + parsing pandas de um zip CVM).
          - id: fundamentos_cvm
            label: 'ETL Fundamentos CVM (DFP: Lucro Líquido/PL/ROE)'
            script: fundamentos_cvm.py
            args: ''
            crons: ['0 16 1 * *']   # dia 1 do mês, 13h BRT (1h após crosswalk_cvm)
            in_all: false
            timeout: 30

          # ── Fundamentos CVM — dry-run. Só leitura, imprime os valores
          # extraídos (Lucro Líquido/PL/ROE) sem escrever em
          # rv_fundamentos -- riscos abertos (ESCALA_MOEDA, DT_REFER) não
          # foram validados contra CSV real, rodar isto antes de confiar
          # no cron mensal.
          - id: fundamentos_cvm_dry_run
            label: 'Fundamentos CVM (dry-run)'
            script: fundamentos_cvm.py
            args: '--dry-run'
            crons: []
            in_all: false
            timeout: 30

          # ── Notícias RSS ──────────────────────────────────────────────
          - id: noticias
            label: 'ETL Notícias RSS'
            script: noticias.py
            args: ''
            crons: ['0 11 * * *', '0 22 * * *']
            in_all: true

          # ── ANBIMA (Índices IMA/IDA + Debêntures + VNA) ──────────────
          - id: anbima
            label: 'ETL ANBIMA (Índices + Debêntures + VNA)'
            script: anbima.py
            args: ''
            crons: ['0 17 * * 1-5']
            in_all: true

          # ── ANBIMA CRI — só no dispatch dedicado. No schedule e no
          # 'all', o job 'anbima' (feed 'all') já coleta CRI/CRA — antes
          # rodava em dobro.
          - id: anbima_cri
            label: 'ETL ANBIMA CRI'
            script: anbima.py
            args: '--feed cri'
            crons: []
            in_all: false

          # ── ANBIMA CRA — só no dispatch dedicado (ver comentário acima).
          - id: anbima_cra
            label: 'ETL ANBIMA CRA'
            script: anbima.py
            args: '--feed cra'
            crons: []
            in_all: false

    steps:
      - uses: actions/checkout@v4
        if: *deve_rodar
      - uses: actions/setup-python@v5
        if: *deve_rodar
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        if: *deve_rodar
        run: pip install -r etl/requirements.txt
      - name: Rodar ${{ matrix.label }}
        if: *deve_rodar
        working-directory: etl
        run: python ${{ matrix.script }} ${{ matrix.args }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
          ANBIMA_CLIENT_ID: ${{ secrets.ANBIMA_CLIENT_ID }}
          ANBIMA_CLIENT_SECRET: ${{ secrets.ANBIMA_CLIENT_SECRET }}
          # Achado: sem TTY, o stdout do Python roda bufferizado -- quando o
          # job é morto por timeout-minutes (ex: investigar_cvm_175), tudo
          # que ficou no buffer é perdido, nenhum print() chega ao log. Já
          # aconteceu 2x (job cancelado sem nenhuma linha de output).
          PYTHONUNBUFFERED: '1'
