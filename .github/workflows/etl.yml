name: ETL Pipeline

on:
  schedule:
    # Tesouro Direto: 10h BRT (13h UTC) — dados do dia anterior disponíveis
    - cron: '0 13 * * 1-5'
    # Renda Variável (B3): 17h30 BRT (20h30 UTC) — após fechamento pregão
    - cron: '30 20 * * 1-5'
    # Fundos CVM: 18h BRT (21h UTC) — CVM publica D-1 à tarde
    - cron: '0 21 * * 1-5'
    # Indicadores macro (BACEN/IBGE): dias úteis 9h BRT (12h UTC).
    # SELIC e CDI são diários — semanal deixava dashboard defasado.
    # IPCA (mensal) e PIB (trimestral) só atualizam quando há nova publicação,
    # mas o ETL é idempotente (upsert), então rodar diário é seguro.
    - cron: '0 12 * * 1-5'
    # ANBIMA: índices IMA/IDA + debêntures às 14h BRT (17h UTC) — dados D-1 disponíveis
    - cron: '0 17 * * 1-5'
  workflow_dispatch:
    inputs:
      etl:
        description: 'ETL para rodar manualmente'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - rf_tesouro
          - rv_historico
          - fundos
          - indicadores
          - anbima
          - anbima_cri
          - anbima_cra

jobs:
  # ── Tesouro Direto (RF) ───────────────────────────────────────────────────
  etl-rf:
    name: ETL Renda Fixa (Tesouro Direto)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'rf_tesouro' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 13 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL Renda Fixa
        working-directory: etl
        run: python rf_tesouro.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ── Renda Variável (B3) ───────────────────────────────────────────────────
  etl-rv:
    name: ETL Renda Variável (B3)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'rv_historico' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '30 20 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL Renda Variável
        working-directory: etl
        run: python rv_historico.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}

  # ── Fundos de Investimento (CVM) ──────────────────────────────────────────
  etl-fundos:
    name: ETL Fundos de Investimento (CVM)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'fundos' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 21 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL Fundos
        working-directory: etl
        run: python fundos.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ── Indicadores Macro ─────────────────────────────────────────────────────
  etl-indicadores:
    name: ETL Indicadores Macro (BACEN/IBGE)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'indicadores' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL Indicadores
        working-directory: etl
        run: python indicadores.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  # ── ANBIMA (Índices IMA/IDA + Debêntures + VNA) ───────────────────────────
  etl-anbima:
    name: ETL ANBIMA (Índices + Debêntures + VNA)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'anbima' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 17 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL ANBIMA
        working-directory: etl
        run: python anbima.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANBIMA_CLIENT_ID: ${{ secrets.ANBIMA_CLIENT_ID }}
          ANBIMA_CLIENT_SECRET: ${{ secrets.ANBIMA_CLIENT_SECRET }}

  # ── ANBIMA CRI (Certificados de Recebíveis Imobiliários) ──────────────────
  etl-anbima-cri:
    name: ETL ANBIMA CRI
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'anbima_cri' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 17 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL CRI
        working-directory: etl
        run: python anbima.py --feed cri
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANBIMA_CLIENT_ID: ${{ secrets.ANBIMA_CLIENT_ID }}
          ANBIMA_CLIENT_SECRET: ${{ secrets.ANBIMA_CLIENT_SECRET }}

  # ── ANBIMA CRA (Certificados de Recebíveis do Agronegócio) ────────────────
  etl-anbima-cra:
    name: ETL ANBIMA CRA
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.etl == 'anbima_cra' || github.event.inputs.etl == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 17 * * 1-5'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar ETL CRA
        working-directory: etl
        run: python anbima.py --feed cra
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANBIMA_CLIENT_ID: ${{ secrets.ANBIMA_CLIENT_ID }}
          ANBIMA_CLIENT_SECRET: ${{ secrets.ANBIMA_CLIENT_SECRET }}
