name: POC — Crosswalk ticker->CD_CVM via B3

# Workflow temporário, só workflow_dispatch -- valida se o endpoint
# não-oficial da B3 (listedCompaniesProxy/GetInitialCompanies) dá pra
# usar como crosswalk ticker->CD_CVM, resolvendo os casos que a POC de
# fundamentos CVM deixou pendentes (RENT3, SUZB3, ELET3). Ver
# etl/poc_b3_crosswalk.py. Remover depois de confirmado/descartado.

on:
  workflow_dispatch:

jobs:
  crosswalk:
    name: POC crosswalk B3
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: etl/requirements.txt
      - name: Instalar dependências
        run: pip install -r etl/requirements.txt
      - name: Rodar POC crosswalk B3
        working-directory: etl
        run: python poc_b3_crosswalk.py
        env:
          PYTHONUNBUFFERED: '1'
