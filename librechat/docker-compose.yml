version: "3.8"

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: LibreChat

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    restart: unless-stopped
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
    environment:
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - HOST=0.0.0.0
      - PORT=3080
      - ALLOW_REGISTRATION=true
      - ALLOW_SOCIAL_LOGIN=false
      - APP_TITLE=Plataforma MCP Brasil
      - HELP_AND_FAQ_URL=https://plataforma-mcp-brasil.vercel.app
      - FILE_UPLOADS=true
      - MESSAGE_USER_MAX=20
      - MESSAGE_USER_WINDOW=60
    env_file:
      - .env
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro
      - librechat_data:/app/client/public/images

volumes:
  mongo_data:
  librechat_data:
