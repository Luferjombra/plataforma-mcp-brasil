services:
  - type: web
    name: plataforma-mcp-brasil-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: LIBRECHAT_BASE_URL
        value: https://librechat-rfev.onrender.com
      - key: LIBRECHAT_SERVICE_EMAIL
        sync: false
      - key: LIBRECHAT_SERVICE_SENHA
        sync: false
      - key: LIBRECHAT_AGENT_ID
        value: agent_YGaq4dos8YWdj1ws4sCAX
      - key: LIBRECHAT_AGENT_NOME
        value: Analista Quant
      - key: ENV
        value: production
